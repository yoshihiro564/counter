<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>阪急バス 定期券発売所マップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{--issue:#d62828;--renew:#e8820c;--window:#1f6fb2;--charge:#f2b705;
    --bg:#eceef0;--panel:#fff;--ink:#1e2a35;--sub:#66727e;--line:#e2e6ea;--accent:#0f6fc4}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;color:var(--ink);overscroll-behavior:none}
  #app{display:flex;height:100vh;height:100dvh;overflow:hidden}
  #side{width:360px;min-width:360px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column}
  header{padding:12px 16px 9px;border-bottom:1px solid var(--line)}
  header h1{margin:0;font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}
  header .sub{font-size:11px;color:var(--sub);margin-top:3px}
  .controls{padding:9px 16px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
  #search{width:100%;padding:8px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;outline:none}
  #search:focus{border-color:var(--accent)}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:11.5px;padding:4px 9px;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--sub);cursor:pointer;user-select:none;transition:.12s;display:flex;align-items:center;gap:5px}
  .chip .sw{width:9px;height:9px;border-radius:2px;display:inline-block}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip.k-issue.on{background:var(--issue);border-color:var(--issue)}
  .chip.k-renew.on{background:var(--renew);border-color:var(--renew)}
  .chip.k-window.on{background:var(--window);border-color:var(--window)}
  .chip.k-charge.on{background:var(--charge);border-color:#c99400;color:#3a2f00}
  .grouplabel{font-size:10.5px;color:#9aa7b2;letter-spacing:.04em;margin-bottom:-2px}
  .timebox{background:#f7f9fb;border:1px solid var(--line);border-radius:9px;padding:9px 11px}
  .timerow{display:flex;align-items:center;gap:9px}
  .timerow input[type=range]{flex:1;accent-color:var(--accent)}
  .timeval{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;min-width:52px;text-align:right}
  .timeval.off{color:#aab4bd;font-weight:600}
  .timehint{font-size:10px;color:var(--sub);margin-top:5px;display:flex;justify-content:space-between}
  .timehint a{color:var(--accent);cursor:pointer;text-decoration:underline}
  .count{font-size:11.5px;color:var(--sub);padding:6px 16px;background:#fafbfc;border-bottom:1px solid var(--line)}
  .count b{color:var(--ink)}
  #list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 10px 24px}
  .card{border:1px solid var(--line);border-left-width:4px;border-radius:8px;padding:9px 12px;margin:6px 0;cursor:pointer;transition:.12s;background:#fff}
  .card:hover{border-color:var(--accent)}
  .card.active{box-shadow:0 0 0 2px rgba(15,111,196,.18)}
  .card .top{display:flex;align-items:center;gap:7px;margin-bottom:2px}
  .badge{font-size:9.5px;font-weight:700;padding:1.5px 6px;border-radius:4px;color:#fff;white-space:nowrap}
  .card .nm{font-size:13px;font-weight:700;line-height:1.3}
  .card .loc{font-size:11px;color:var(--sub);margin:1px 0 5px}
  .card .hr{font-size:10.5px;color:#3d5566;margin-bottom:5px}
  .tags{display:flex;flex-wrap:wrap;gap:4px}
  .tag{font-size:10px;padding:1.5px 6px;border-radius:4px;background:#eef2f6;color:#4a5b6a}
  .tag.bus{background:#fdeee0;color:#a55a12}.tag.hanica{background:#e4f0fb;color:#1462a0}.tag.cc{background:#e9f7ec;color:#1c7a3a}
  #map{flex:1;height:100%;background:#e8eaec}
  .leaflet-tile-pane{filter:grayscale(1) contrast(1.06) brightness(1.02)}
  .maptop{position:absolute;z-index:600;top:10px;right:10px;display:flex;gap:6px}
  .mbtn{background:#fff;border:1px solid var(--line);border-radius:7px;padding:6px 10px;font-size:11.5px;cursor:pointer;box-shadow:0 1px 5px rgba(0,0,0,.12);user-select:none}
  .mbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .pinbox{overflow:visible!important;background:none!important;border:none!important}
  .pinbox svg{filter:drop-shadow(0 1px 1.5px rgba(0,0,0,.35))}
  .pinbox .plabel{position:absolute;left:11px;bottom:20px;transform:translateX(-50%);
    font-size:9px;font-weight:700;line-height:1.2;color:#fff;white-space:normal;width:max-content;
    max-width:150px;text-align:center;padding:2px 6px;border-radius:7px;border:1.5px solid #fff;
    box-shadow:0 2px 4px rgba(0,0,0,.3);pointer-events:none;background:var(--bg)}
  .pinbox .plabel:after{content:'';position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);
    width:0;height:0;border:5px solid transparent;border-top:6px solid var(--bg);border-bottom:0}
  #map.nolabels .plabel{display:none}
  .lbl-issue{--bg:var(--issue)} .lbl-renew{--bg:var(--renew)}
  .lbl-window{--bg:var(--window)} .lbl-charge{--bg:var(--charge);color:#3a2f00}
  .leaflet-popup-content{margin:11px 13px;font-family:inherit}
  .pop h3{margin:0 0 6px;font-size:14px;display:flex;align-items:center;gap:6px}
  .pop .row{font-size:11.5px;margin:4px 0;line-height:1.45}
  .pop .k{color:var(--sub);font-weight:700}
  .pop .hours{background:#f6f8fa;border-radius:6px;padding:6px 8px;white-space:pre-wrap;font-size:11px;line-height:1.5}
  .pop .note{color:#a55a12;font-size:10.5px;white-space:pre-wrap;margin-top:3px}
  .pop .svc{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
  .pop .svc span{font-size:10px;background:#eef2f6;padding:1px 6px;border-radius:4px}
  .pop .trouble{margin-top:7px;background:#fff5f2;border:1px solid #f3d3c8;border-radius:6px;padding:6px 8px;font-size:10.5px;line-height:1.5}
  .pop .trouble.blue{background:#f1f7fc;border-color:#cfe1f0}
  .pop .trouble b{font-size:11px}
  .kindtag{font-size:9.5px;font-weight:700;color:#fff;padding:1.5px 7px;border-radius:4px}
  .legend{position:absolute;z-index:500;bottom:14px;right:10px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 11px;font-size:11px;box-shadow:0 2px 10px rgba(0,0,0,.12)}
  .legend .li{display:flex;align-items:center;gap:7px;margin:3px 0}
  .legend .tri{width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:10px solid #999}
  #mobtoggle{display:none;margin-left:auto;font-size:11px;color:var(--accent);cursor:pointer;white-space:nowrap}
  @media(max-width:780px){
    #app{flex-direction:column}
    #side{width:100%;min-width:0;height:46%;border-right:none;border-bottom:1px solid var(--line)}
    #map{height:54%}
    #mobtoggle{display:inline-block}
    #side.collapsed{height:auto;flex:none}
    #side.collapsed #list,#side.collapsed .count{display:none}
    .legend{bottom:10px;font-size:10px}
  }
</style>
</head>
<body>
<div id="app">
  <div id="side">
    <header>
      <h1>阪急バス 定期券発売所・サービスカウンター<span id="mobtoggle">一覧▲</span></h1>
      <div class="sub">全59か所／機器種別・営業時間帯・クレカ可否で絞り込み</div>
    </header>
    <div class="controls">
      <input id="search" type="text" placeholder="名称・市町村で検索…">
      <div class="timebox">
        <div class="grouplabel" style="margin-bottom:6px">この時刻に開いている拠点を表示</div>
        <div class="timerow">
          <input id="timeSlider" type="range" min="6" max="23" step="1" value="12">
          <span class="timeval off" id="timeVal">指定なし</span>
        </div>
        <div class="timehint"><span>6時〜23時</span><a id="timeClear">解除</a></div>
      </div>
      <div class="grouplabel">機器種別</div>
      <div class="chips" id="kindChips">
        <div class="chip k-issue"  data-f="kind" data-v="発行機"><span class="sw" style="background:var(--issue)"></span>自動定期券発行機</div>
        <div class="chip k-renew"  data-f="kind" data-v="継続機"><span class="sw" style="background:var(--renew)"></span>自動定期券継続機</div>
        <div class="chip k-window" data-f="kind" data-v="窓口"><span class="sw" style="background:var(--window)"></span>窓口端末(有人)</div>
        <div class="chip k-charge" data-f="kind" data-v="チャージ機"><span class="sw" style="background:var(--charge)"></span>チャージ機</div>
      </div>
      <div class="grouplabel">取扱</div>
      <div class="chips">
        <div class="chip" data-f="cc">クレカ可</div>
        <div class="chip" data-f="bus">バス乗車券</div>
        <div class="chip" data-f="hanica">hanica</div>
      </div>
      <div class="grouplabel">エリア</div>
      <div class="chips" id="prefChips"></div>
    </div>
    <div class="count" id="count"></div>
    <div id="list"></div>
  </div>
  <div id="map">
    <div class="maptop"><div class="mbtn on" id="labelBtn">🏷 ラベル</div></div>
    <div class="legend">
      <div class="li"><span class="tri" style="border-top-color:var(--issue)"></span>自動定期券発行機</div>
      <div class="li"><span class="tri" style="border-top-color:var(--renew)"></span>自動定期券継続機</div>
      <div class="li"><span class="tri" style="border-top-color:var(--window)"></span>窓口端末(有人)</div>
      <div class="li"><span class="tri" style="border-top-color:var(--charge)"></span>チャージ機</div>
    </div>
  </div>
</div>

const cs=getComputedStyle(document.documentElement);
const KCOL={'発行機':cs.getPropertyValue('--issue').trim(),'継続機':cs.getPropertyValue('--renew').trim(),
           '窓口':cs.getPropertyValue('--window').trim(),'チャージ機':cs.getPropertyValue('--charge').trim()};
const KLABEL={'発行機':'自動定期券発行機','継続機':'自動定期券継続機','窓口':'窓口端末(有人)','チャージ機':'チャージ機'};

// トラブル時 連絡先（設置機器別）
const CONTACT={
  'HHES':{cls:'',html:'<b>🛠 トラブル時（自動定期券発行機）</b><br>株式会社阪急阪神電気システム（HHES）<br>Tel：06-6373-5280<br>受付：24時間365日／現地派遣：9:00〜15:00 365日'},
  'RESIP':{cls:'blue',html:'<b>🛠 トラブル時（チャージ機・継続機）</b><br>レシップ 田中様　06-6881-4685<br>（携帯：090-4648-1800）／平日・日中対応'}
};
function machineContacts(machines){
  const s=new Set(machines.map(m=>m==='発行機'?'HHES':'RESIP'));return [...s];
}

const map=L.map('map',{zoomControl:true,zoomSnap:.5}).setView([34.78,135.42],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'&copy; OpenStreetMap contributors',maxZoom:19}).addTo(map);

function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function fmt(m){return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');}
function pinIcon(d){
  return L.divIcon({className:'pinbox',iconSize:[22,22],iconAnchor:[11,21],
    html:`<div class="plabel ${KCLASS[d.kind]}">${esc(d.name)}</div>`+
      `<svg width="22" height="22" viewBox="0 0 22 22"><polygon points="11,21 2,4 20,4" fill="${KCOL[d.kind]}" stroke="#fff" stroke-width="2.2" stroke-linejoin="round"/></svg>`});
}
function popupHTML(d){
  const svc=(l,a)=>a&&a.length?`<div class="row"><span class="k">${l}</span><div class="svc">${a.map(x=>`<span>${esc(x)}</span>`).join('')}</div></div>`:'';
  const line=(l,a)=>a&&a.length?`<div class="row"><span class="k">${l}</span> ${a.map(esc).join('・')}</div>`:'';
  return `<div class="pop"><h3><span class="kindtag" style="background:${KCOL[d.kind]};${d.kind==='チャージ機'?'color:#3a2f00':''}">${KLABEL[d.kind]}</span></h3>
    <div class="row" style="font-size:13px;font-weight:700">${esc(d.name)}</div>
    <div class="row">${esc(d.pref)} ${esc(d.city)}　<span style="color:${d.type==='直営'?'#b5322a':'#1f5f96'}">${esc(d.type)}</span></div>
    ${d.hours?`<div class="hours">${esc(d.hours)}${d.hours_info?`<div class="note">${esc(d.hours_info)}</div>`:''}</div>`:''}
    <div class="row"><span class="k">取扱</span> ${d.cc?'💳クレカ可 ':''}${d.bus?'🎫バス乗車券 ':''}${d.hanica?'🔷hanica':''}</div>
    ${d.machines&&d.machines.length?`<div class="row"><span class="k">🖥 設置機器</span> ${d.mnote?esc(d.mnote):d.machines.map(m=>KLABEL[m]).join('・')}${d.kind==='窓口'?'（案内所併設）':''}</div>`:''}
    ${svc('hanicaプリペイド',d.prepaid)}${svc('hanica定期券',d.pass)}${line('クレジット定期',d.credit)}
    ${line('回数券系統',d.multi_line)}${line('定期券系統',d.regular_line)}${line('一日乗車券',d.oneday_line)}
    ${(d.machines||[]).length?machineContacts(d.machines).map(k=>`<div class="trouble ${CONTACT[k].cls}">${CONTACT[k].html}</div>`).join(''):''}</div>`;
}

const markers={},cards={},TRUE={},POS={};let active=null,labelsOn=true;
const KCLASS={'発行機':'lbl-issue','継続機':'lbl-renew','窓口':'lbl-window','チャージ機':'lbl-charge'};

// 近接拠点を一度だけ固定オフセット（メートル基準・ズーム非依存＝遠くへ飛ばない）
(function(){
  DATA.forEach(d=>{TRUE[d.id]=[d.lat,d.lng];POS[d.id]=[d.lat,d.lng];});
  const TH=180;                       // これ以内(m)を「同一地点」とみなす
  const used={};
  for(let i=0;i<DATA.length;i++){
    const a=DATA[i];if(used[a.id])continue;
    const grp=[a];used[a.id]=true;
    for(let j=i+1;j<DATA.length;j++){const b=DATA[j];
      if(!used[b.id]&&map.distance([a.lat,a.lng],[b.lat,b.lng])<TH){grp.push(b);used[b.id]=true;}}
    if(grp.length<2)continue;
    let clat=0,clng=0;grp.forEach(g=>{clat+=g.lat;clng+=g.lng;});clat/=grp.length;clng/=grp.length;
    const R=Math.min(90,42+grp.length*9);           // 展開半径(m) 上限90m
    const mLat=111320,mLng=111320*Math.cos(clat*Math.PI/180);
    grp.forEach((g,k)=>{const ang=2*Math.PI*k/grp.length-Math.PI/2;
      POS[g.id]=[clat+R*Math.sin(ang)/mLat, clng+R*Math.cos(ang)/mLng];});
  }
})();

DATA.forEach(d=>{
  const m=L.marker(POS[d.id],{icon:pinIcon(d),riseOnHover:true})
    .bindPopup(popupHTML(d),{maxWidth:300,minWidth:230});
  m.on('click',()=>setActive(d.id,false));markers[d.id]=m;d._m=m;
});

const prefBox=document.getElementById('prefChips');
[...new Set(DATA.map(d=>d.pref))].forEach(p=>{const c=document.createElement('div');c.className='chip';c.dataset.f='pref';c.dataset.v=p;c.textContent=p;prefBox.appendChild(c);});

const filters={kind:new Set(),pref:new Set(),cc:false,bus:false,hanica:false};
let openMin=null;
document.querySelectorAll('.chip').forEach(ch=>ch.addEventListener('click',()=>{
  const f=ch.dataset.f,v=ch.dataset.v;
  if(v===undefined)filters[f]=!filters[f];else filters[f].has(v)?filters[f].delete(v):filters[f].add(v);
  ch.classList.toggle('on');render();
}));
document.getElementById('search').addEventListener('input',render);
const slider=document.getElementById('timeSlider'),tv=document.getElementById('timeVal');
slider.addEventListener('input',()=>{openMin=slider.value*60;tv.textContent=fmt(openMin);tv.classList.remove('off');render();});
document.getElementById('timeClear').onclick=()=>{openMin=null;tv.textContent='指定なし';tv.classList.add('off');render();};
document.getElementById('labelBtn').addEventListener('click',e=>{
  labelsOn=!labelsOn;e.target.classList.toggle('on',labelsOn);
  document.getElementById('map').classList.toggle('nolabels',!labelsOn);
});

function openAt(d,min){return d.ranges.some(r=>(r[0]<=min&&min<r[1])||(r[0]<=min+1440&&min+1440<r[1]));}
function match(d){
  const q=document.getElementById('search').value.trim();
  if(q&&!(d.name.includes(q)||d.city.includes(q)||d.pref.includes(q)))return false;
  if(filters.kind.size&&!filters.kind.has(d.kind))return false;
  if(filters.pref.size&&!filters.pref.has(d.pref))return false;
  if(filters.cc&&!d.cc)return false;
  if(filters.bus&&!d.bus)return false;
  if(filters.hanica&&!d.hanica)return false;
  if(openMin!==null&&!openAt(d,openMin))return false;
  return true;
}
function render(){
  const list=document.getElementById('list');list.innerHTML='';let n=0;
  DATA.forEach(d=>{
    const ok=match(d),on=map.hasLayer(markers[d.id]);
    if(ok&&!on)markers[d.id].addTo(map);
    else if(!ok&&on)map.removeLayer(markers[d.id]);
    if(!ok)return;n++;
    const openTxt=openMin!==null?`<div class="hr">🕒 ${esc(d.hours)}</div>`:'';
    const c=document.createElement('div');c.className='card';c.dataset.id=d.id;c.style.borderLeftColor=KCOL[d.kind];
    c.innerHTML=`<div class="top"><span class="badge" style="background:${KCOL[d.kind]};${d.kind==='チャージ機'?'color:#3a2f00':''}">${KLABEL[d.kind]}</span><span class="nm">${esc(d.name)}</span></div>
      <div class="loc">${esc(d.pref)} ${esc(d.city)}</div>${openTxt}
      <div class="tags">${d.cc?'<span class="tag cc">クレカ</span>':''}${d.bus?'<span class="tag bus">バス乗車券</span>':''}${d.hanica?'<span class="tag hanica">hanica</span>':''}</div>`;
    c.addEventListener('click',()=>setActive(d.id,true));list.appendChild(c);cards[d.id]=c;
  });
  const suffix=openMin!==null?`（${fmt(openMin)}に営業中）`:'';
  document.getElementById('count').innerHTML=`表示中 <b>${n}</b> か所 / 全 ${DATA.length} ${suffix}`;
}
function setActive(id,fly){
  if(active&&cards[active])cards[active].classList.remove('active');active=id;
  const d=DATA.find(x=>x.id===id);
  if(cards[id]){cards[id].classList.add('active');cards[id].scrollIntoView({block:'nearest',behavior:'smooth'});}
  if(fly)map.flyTo([d.lat,d.lng],15,{duration:.55});
  markers[id].openPopup();
}
document.getElementById('mobtoggle').addEventListener('click',e=>{
  const s=document.getElementById('side');s.classList.toggle('collapsed');
  e.target.textContent=s.classList.contains('collapsed')?'一覧▼':'一覧▲';
  setTimeout(()=>map.invalidateSize(),200);
});
render();
map.fitBounds(L.latLngBounds(DATA.map(d=>[d.lat,d.lng])).pad(.08));
</script>
